<!doctype html><html><head><meta charset="utf-8"><title>Quiet Finance — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="finance.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body>
<div id="root"></div>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Toolbar.jsx"></script>
<script type="text/babel" src="NetWorth.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [active, setActive] = useState('net-worth');
  const [currency, setCurrency] = useState('USD');
  const [compare, setCompare] = useState('prev');
  return (
    <div className="qf-window">
      <Titlebar/>
      <div className="qf-body">
        <Sidebar active={active} setActive={setActive}/>
        <main className="qf-main">
          <Toolbar currency={currency} setCurrency={setCurrency} compare={compare} setCompare={setCompare}/>
          <NetWorthHero compare={compare} setCompare={setCompare}/>
          <AIBanner/>
          <KPICards/>
          <GoalCard/>
          <div className="qf-section">
            <div className="qf-section-title">Composition <em>— where it lives</em></div>
            <div className="qf-section-meta">MAY 18, 2026 · USD</div>
          </div>
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
