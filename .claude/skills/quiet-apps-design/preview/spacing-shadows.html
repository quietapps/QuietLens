<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  .row{flex-wrap:wrap;gap:18px;}
  .box{width:100px;height:64px;background:#fff;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--qa-font-mono);font-size:10px;color:var(--qa-fg-3);}
  body{background:var(--qa-bg-2);padding:26px 22px;}

</style></head><body>
  <div class="name">Elevation · near-black, low alpha</div>
  <div class="row">
    <div class="box" style="box-shadow:0 0 0 1px var(--qa-line);">hairline</div>
    <div class="box" style="box-shadow:0 1px 2px rgba(14,17,22,.05),0 0 0 1px rgba(14,17,22,.04);">card · 1</div>
    <div class="box" style="box-shadow:0 2px 6px rgba(14,17,22,.06),0 0 0 1px rgba(14,17,22,.04);">pop · 2</div>
    <div class="box" style="box-shadow:0 8px 24px rgba(14,17,22,.10),0 0 0 1px rgba(14,17,22,.04);">float · 3</div>
    <div class="box" style="box-shadow:0 16px 48px rgba(14,17,22,.16),0 0 0 1px rgba(14,17,22,.05);">window · 4</div>
  </div>
</body></html>
