<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  body{padding:22px;}
  .row{gap:10px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:10px;font-family:var(--qa-font-body);font-weight:600;font-size:14px;cursor:pointer;border:0;background:transparent;color:var(--qa-fg-1);transition:background .12s var(--qa-ease-out),transform .12s var(--qa-ease-out);}
  .btn.primary{background:var(--qa-blue);color:#fff;}
  .btn.primary:hover{background:var(--qa-blue-600);}
  .btn.secondary{background:var(--qa-bg-1);box-shadow:inset 0 0 0 1px var(--qa-line);}
  .btn.secondary:hover{background:var(--qa-bg-3);}
  .btn.ghost:hover{background:var(--qa-bg-3);}
  .btn.danger{background:#fff;color:var(--qa-danger);box-shadow:inset 0 0 0 1px rgba(200,57,47,.3);}
  .btn.disabled{opacity:.4;cursor:not-allowed;}
  .btn svg{width:16px;height:16px;}

</style></head><body>
  <div class="name">Buttons · 36px height, 10px radius</div>
  <div class="row" style="margin-bottom:12px;">
    <button class="btn primary">Add account</button>
    <button class="btn secondary">Cancel</button>
    <button class="btn ghost">Learn more</button>
    <button class="btn danger">Delete</button>
    <button class="btn primary disabled">Saving…</button>
  </div>
  <div class="row">
    <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New snapshot</button>
    <button class="btn secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>Refresh</button>
  </div>
</body></html>
