<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
</style></head><body>
  <div class="name">Body & UI</div>
  <div style="font-family:var(--qa-font-body);font-size:15px;line-height:1.45;color:var(--qa-fg-1);max-width:540px;">Track your net worth. Locally. Take a snapshot once a month and Quiet Finance will keep a quiet history — no accounts, no cloud, no nudges.</div>
  <div style="font-family:var(--qa-font-body);font-size:13px;line-height:1.45;color:var(--qa-fg-2);margin-top:10px;">Secondary copy sits at 13px in <code style="font-family:var(--qa-font-mono);">--qa-fg-2</code>. Tertiary and metadata drop another step.</div>
  <div style="font-family:var(--qa-font-body);font-weight:600;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--qa-fg-3);margin-top:10px;">eyebrow / label</div>
</body></html>
