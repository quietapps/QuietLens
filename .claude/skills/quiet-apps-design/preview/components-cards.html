<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  body{padding:22px;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .c{background:#fff;border-radius:14px;box-shadow:var(--qa-shadow-1);padding:16px;}
  .c h4{margin:0 0 4px;font-family:var(--qa-font-display);font-weight:600;font-size:14px;}
  .c .v{font-family:var(--qa-font-mono);font-weight:500;font-size:22px;color:var(--qa-fg-1);letter-spacing:-0.01em;}
  .c .d{font-size:12px;color:var(--qa-success);margin-top:2px;font-family:var(--qa-font-mono);}
  .c.dark{background:#0B0D11;color:#F2F3F5;}
  .c.dark .v{color:#fff;}
  .c.dark h4{color:#B8BDC6;}

</style></head><body>
  <div class="cards">
    <div class="c"><h4>Net worth</h4><div class="v">$ 184,520.45</div><div class="d">+ $1,240 · this month</div></div>
    <div class="c dark"><h4>Focus session</h4><div class="v">24 : 32</div><div class="d" style="color:#8DC4F1">Lens active · Deep</div></div>
  </div>
</body></html>
