<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  body{background:#0B0D11;color:#F2F3F5;}.name{color:#B8BDC6;}.hex{color:#B8BDC6;}
</style></head><body>
  <div class="name">Dark surfaces · menu bar, scrims, notch widget</div>
  <div class="grid" style="grid-template-columns:repeat(5,1fr);">
    <div><div class="swatch" style="background:#0B0D11;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)"><span class="lbl" style="color:inherit;opacity:.85">dark-1</span></div><div class="hex" style="margin-top:4px">#0B0D11</div></div><div><div class="swatch" style="background:#16191F;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)"><span class="lbl" style="color:inherit;opacity:.85">dark-2</span></div><div class="hex" style="margin-top:4px">#16191F</div></div><div><div class="swatch" style="background:#20242C;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)"><span class="lbl" style="color:inherit;opacity:.85">dark-3</span></div><div class="hex" style="margin-top:4px">#20242C</div></div><div><div class="swatch" style="background:#2A2F38;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)"><span class="lbl" style="color:inherit;opacity:.85">dark-line</span></div><div class="hex" style="margin-top:4px">#2A2F38</div></div><div><div class="swatch" style="background:#F2F3F5;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)"><span class="lbl" style="color:inherit;opacity:.85">on-dark</span></div><div class="hex" style="margin-top:4px">#F2F3F5</div></div>
  </div>
</body></html>
