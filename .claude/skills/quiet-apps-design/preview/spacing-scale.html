<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  .bar{height:18px;background:var(--qa-blue-200);border-radius:4px;}
  .row{align-items:center;gap:14px;}
  .tok{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);min-width:64px;}
  .px{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-2);}

</style></head><body>
  <div class="name">Spacing · 4pt scale</div>
  <div class="grid" style="gap:6px;">
    <div class="row"><div class="tok">--qa-space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div><div class="row"><div class="tok">--qa-space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div><div class="row"><div class="tok">--qa-space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div><div class="row"><div class="tok">--qa-space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div><div class="row"><div class="tok">--qa-space-5</div><div class="bar" style="width:20px"></div><div class="px">20px</div></div><div class="row"><div class="tok">--qa-space-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div><div class="row"><div class="tok">--qa-space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div><div class="row"><div class="tok">--qa-space-10</div><div class="bar" style="width:40px"></div><div class="px">40px</div></div><div class="row"><div class="tok">--qa-space-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div><div class="row"><div class="tok">--qa-space-16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  </div>
</body></html>
