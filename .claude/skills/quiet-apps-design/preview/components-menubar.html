<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  body{padding:0;background:#1f2530;height:300px;}
  .mb{height:24px;background:rgba(11,13,17,.86);backdrop-filter:blur(28px);display:flex;align-items:center;padding:0 12px;color:#F2F3F5;font-size:12px;gap:14px;}
  .mb .right{margin-left:auto;display:flex;gap:14px;align-items:center;}
  .mb svg{width:14px;height:14px;}
  .anchor{position:relative;}
  .panel{position:absolute;right:0;top:30px;width:300px;background:#0B0D11;color:#F2F3F5;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);padding:14px;font-size:13px;}
  .panel h5{margin:0 0 8px;font-size:11px;color:#B8BDC6;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
  .panel .row2{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid #20242C;}
  .panel .row2:first-of-type{border-top:0;}
  .sw{width:30px;height:18px;background:#1E88E5;border-radius:99px;position:relative;}
  .sw::after{content:"";width:14px;height:14px;background:#fff;border-radius:99px;position:absolute;top:2px;right:2px;}
  .sw.off{background:#2A2F38;}
  .sw.off::after{left:2px;right:auto;}

</style></head><body>
  <div class="mb">
    <span>QuietLens</span><span>File</span><span>Edit</span><span>View</span>
    <div class="right">
      <span style="font-family:var(--qa-font-mono);">22:18</span>
      <div class="anchor">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        <div class="panel">
          <h5>Quiet Lens</h5>
          <div class="row2"><span>Dim unfocused windows</span><span class="sw"></span></div>
          <div class="row2"><span>Mode</span><span style="color:#8DC4F1;">Deep</span></div>
          <div class="row2"><span>Auto-pause on call</span><span class="sw off"></span></div>
        </div>
      </div>
    </div>
  </div>
</body></html>
