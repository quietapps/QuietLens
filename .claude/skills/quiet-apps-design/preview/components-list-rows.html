<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
  body{padding:22px;}
  .list{background:#fff;border-radius:14px;box-shadow:var(--qa-shadow-1);overflow:hidden;}
  .r{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--qa-line);}
  .r:first-child{border-top:0;}
  .r:hover{background:var(--qa-bg-3);}
  .ico{width:32px;height:32px;border-radius:8px;background:var(--qa-blue-100);display:flex;align-items:center;justify-content:center;color:var(--qa-blue);flex:none;}
  .ico svg{width:18px;height:18px;}
  .name{flex:1;font-size:14px;font-weight:500;}
  .meta{font-family:var(--qa-font-mono);font-size:13px;color:var(--qa-fg-2);}

</style></head><body>
  <div class="list">
    <div class="r"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg></div><div class="name">Chase Checking</div><div class="meta">$ 12,408.50</div></div>
    <div class="r"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18 L10 12 L14 16 L20 8"/><path d="M14 8h6v6"/></svg></div><div class="name">Fidelity Brokerage</div><div class="meta">$ 142,012.10</div></div>
    <div class="r"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div><div class="name">Ally Savings</div><div class="meta">$ 30,100.00</div></div>
  </div>
</body></html>
