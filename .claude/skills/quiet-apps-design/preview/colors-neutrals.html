<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:18px 20px;}
  .grid{display:grid;gap:12px;}
  .row{display:flex;gap:12px;align-items:center;}
  .swatch{width:100%;height:64px;border-radius:var(--qa-r-md);box-shadow:inset 0 0 0 1px rgba(14,17,22,0.06);display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;}
  .lbl{font-size:11px;font-weight:600;color:var(--qa-fg-2);}
  .hex{font-family:var(--qa-font-mono);font-size:11px;color:var(--qa-fg-3);}
  .name{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 8px;}
  .card{background:var(--qa-bg-1);border-radius:var(--qa-r-lg);padding:16px;box-shadow:var(--qa-shadow-1);}
  
</style></head><body>
  <div class="name">Neutrals · cool-neutral, not warm</div>
  <div class="grid" style="grid-template-columns:repeat(8,1fr);">
    <div><div class="swatch" style="background:#FFFFFF;color:#0E1116"><span class="lbl" style="color:inherit;opacity:.85">bg-1</span></div><div class="hex" style="margin-top:4px">#FFFFFF</div></div><div><div class="swatch" style="background:#F7F8FA;color:#0E1116"><span class="lbl" style="color:inherit;opacity:.85">bg-2</span></div><div class="hex" style="margin-top:4px">#F7F8FA</div></div><div><div class="swatch" style="background:#EEF0F3;color:#0E1116"><span class="lbl" style="color:inherit;opacity:.85">bg-3</span></div><div class="hex" style="margin-top:4px">#EEF0F3</div></div><div><div class="swatch" style="background:#E4E6EA;color:#0E1116"><span class="lbl" style="color:inherit;opacity:.85">line</span></div><div class="hex" style="margin-top:4px">#E4E6EA</div></div><div><div class="swatch" style="background:#9AA0AA;color:#fff"><span class="lbl" style="color:inherit;opacity:.85">fg-4</span></div><div class="hex" style="margin-top:4px">#9AA0AA</div></div><div><div class="swatch" style="background:#6C737E;color:#fff"><span class="lbl" style="color:inherit;opacity:.85">fg-3</span></div><div class="hex" style="margin-top:4px">#6C737E</div></div><div><div class="swatch" style="background:#3A4049;color:#fff"><span class="lbl" style="color:inherit;opacity:.85">fg-2</span></div><div class="hex" style="margin-top:4px">#3A4049</div></div><div><div class="swatch" style="background:#0E1116;color:#fff"><span class="lbl" style="color:inherit;opacity:.85">ink</span></div><div class="hex" style="margin-top:4px">#0E1116</div></div>
  </div>
</body></html>
