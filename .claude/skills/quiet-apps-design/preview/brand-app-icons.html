<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--qa-bg-2);font-family:var(--qa-font-body);color:var(--qa-fg-1);}
  body{padding:14px 16px;}
  .eye{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--qa-fg-3);margin:0 0 10px;display:flex;align-items:baseline;gap:8px;}
  .eye small{font-weight:500;letter-spacing:0;text-transform:none;color:var(--qa-fg-4);}

  .row{display:flex;gap:16px;align-items:flex-start;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .canvas{width:140px;height:140px;display:block;filter:drop-shadow(0 6px 14px rgba(14,17,22,.18));}

  .nm{font-size:11px;color:var(--qa-fg-1);font-weight:600;}
  .meta{font-family:var(--qa-font-mono);font-size:9px;color:var(--qa-fg-3);}

  .dock{
    margin-top:14px;background:rgba(20,20,25,.7);backdrop-filter:blur(20px);
    border-radius:18px;padding:8px 14px;display:flex;gap:12px;align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.3), inset 0 0 0 1px rgba(255,255,255,.06);
    width:fit-content;
  }
  .dock svg{width:48px;height:48px;display:block;}
  .dock-sep{width:1px;height:32px;background:rgba(255,255,255,.12);}
  .dock-stub{width:42px;height:42px;border-radius:22%;}

  .spec{margin-top:14px;font-family:var(--qa-font-mono);font-size:10px;color:var(--qa-fg-3);line-height:1.55;background:var(--qa-bg-1);border-radius:8px;padding:9px 12px;box-shadow:var(--qa-shadow-1);}
  .spec b{color:var(--qa-fg-1);font-weight:600;}
</style></head>
<body>
  <div class="eye">App icons · Apple HIG <small>1024 canvas · 9% safe area · n=5 squircle · 22% corner</small></div>

  <div class="row">

    <!-- ── Quiet Lens ── -->
    <div class="ic">
      <svg class="canvas" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gL" x1="0" y1="0" x2=".4" y2="1">
            <stop offset="0" stop-color="#3D93D8"/>
            <stop offset=".55" stop-color="#1E88E5"/>
            <stop offset="1" stop-color="#0E4682"/>
          </linearGradient>
          <filter id="blurL" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="14"/>
          </filter>
          <clipPath id="clipL"><path class="sq"/></clipPath>
        </defs>
        <path class="sq" fill="url(#gL)"/>
        <g clip-path="url(#clipL)">
          <g filter="url(#blurL)">
            <rect x="200" y="220" width="430" height="320" rx="40" fill="rgba(255,255,255,.30)"/>
            <rect x="430" y="430" width="430" height="320" rx="40" fill="rgba(255,255,255,.22)" transform="rotate(4 645 590)"/>
          </g>
          <g transform="translate(280 360)">
            <rect width="465" height="340" rx="44" fill="#FFFFFF"/>
            <rect width="465" height="44" rx="0" fill="#EEEEEE"/>
            <rect width="465" height="44" rx="0" y="0" fill="#EEEEEE"/>
            <path d="M 0 0 H 465 V 44 H 0 Z" fill="#EEEEEE"/>
            <circle cx="42" cy="42" r="13" fill="#FF5F57"/>
            <circle cx="80" cy="42" r="13" fill="#FEBC2E"/>
            <circle cx="118" cy="42" r="13" fill="#28C840"/>
            <rect x="44" y="110" width="260" height="22" rx="11" fill="#1E88E5"/>
            <rect x="44" y="160" width="180" height="14" rx="7" fill="#BDDDF7"/>
            <rect x="44" y="190" width="240" height="14" rx="7" fill="#BDDDF7"/>
            <rect x="44" y="220" width="200" height="14" rx="7" fill="#BDDDF7"/>
          </g>
        </g>
      </svg>
      <div class="nm">Quiet Lens</div>
      <div class="meta">focus · blur</div>
    </div>

    <!-- ── Quiet Finance — back to the simple ascending-bars metaphor ── -->
    <div class="ic">
      <svg class="canvas" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gF" x1="0" y1="0" x2=".4" y2="1">
            <stop offset="0" stop-color="#3D93D8"/>
            <stop offset=".55" stop-color="#1E88E5"/>
            <stop offset="1" stop-color="#0E4682"/>
          </linearGradient>
        </defs>
        <path class="sq" fill="url(#gF)"/>
        <!-- six ascending snapshot bars + today indicator -->
        <g>
          <rect x="230" y="640" width="68"  height="170" rx="14" fill="#FFFFFF" opacity=".55"/>
          <rect x="318" y="560" width="68"  height="250" rx="14" fill="#FFFFFF" opacity=".55"/>
          <rect x="406" y="600" width="68"  height="210" rx="14" fill="#FFFFFF" opacity=".55"/>
          <rect x="494" y="480" width="68"  height="330" rx="14" fill="#FFFFFF" opacity=".55"/>
          <rect x="582" y="520" width="68"  height="290" rx="14" fill="#FFFFFF" opacity=".55"/>
          <rect x="670" y="370" width="68"  height="440" rx="14" fill="#FFFFFF"/>
          <!-- today marker -->
          <circle cx="704" cy="305" r="34" fill="#FFFFFF"/>
          <circle cx="704" cy="305" r="56" fill="#FFFFFF" opacity=".25"/>
        </g>
      </svg>
      <div class="nm">Quiet Finance</div>
      <div class="meta">net worth · snapshots</div>
    </div>

    <!-- ── Quiet Notch ── -->
    <div class="ic">
      <svg class="canvas" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gN" x1="0" y1="0" x2=".3" y2="1">
            <stop offset="0" stop-color="#26262E"/>
            <stop offset="1" stop-color="#0A0A0C"/>
          </linearGradient>
          <linearGradient id="gAlbum" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#c5b8a3"/>
            <stop offset="1" stop-color="#2a1f12"/>
          </linearGradient>
          <clipPath id="clipN"><path class="sq"/></clipPath>
        </defs>
        <path class="sq" fill="url(#gN)"/>
        <g clip-path="url(#clipN)">
          <!-- dynamic island pill at the top -->
          <rect x="170" y="170" width="684" height="220" rx="110"
                fill="#000000" stroke="rgba(255,255,255,.06)" stroke-width="2"/>
          <!-- camera dot -->
          <circle cx="512" cy="244" r="22" fill="#1A1A1F"/>
          <circle cx="512" cy="244" r="9"  fill="#1E88E5"/>
          <!-- mini album -->
          <rect x="220" y="225" width="110" height="110" rx="18" fill="url(#gAlbum)"/>
          <!-- audio bars -->
          <g fill="#FFFFFF">
            <rect x="660" y="245" width="14" height="50" rx="7"/>
            <rect x="688" y="220" width="14" height="100" rx="7"/>
            <rect x="716" y="235" width="14" height="70" rx="7"/>
            <rect x="744" y="248" width="14" height="44" rx="7"/>
          </g>
          <!-- content tiles below -->
          <g>
            <rect x="160" y="540" width="160" height="160" rx="28" fill="rgba(255,255,255,.08)"/>
            <path d="M 220 660 V 590 L 280 580 V 650"
                  stroke="#F2F3F5" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="222" cy="665" r="14" fill="#F2F3F5"/>
            <circle cx="280" cy="655" r="14" fill="#F2F3F5"/>

            <rect x="340" y="540" width="160" height="160" rx="28" fill="#1E88E5"/>
            <text x="420" y="650" text-anchor="middle"
                  font-family="'SF Pro Display', system-ui, sans-serif"
                  font-weight="700" font-size="88" fill="#FFFFFF">13</text>

            <rect x="520" y="540" width="160" height="160" rx="28" fill="rgba(255,255,255,.08)"/>
            <circle cx="600" cy="610" r="40" fill="#d8a684"/>
            <path d="M 540 700 q 60 -50 120 0 V 700 Z" fill="#1f1b18"/>
            <path d="M 540 700 H 660 V 700 Z" fill="#1f1b18"/>
            <rect x="540" y="675" width="120" height="25" fill="#1f1b18"/>

            <rect x="700" y="540" width="160" height="160" rx="28" fill="rgba(255,255,255,.08)"/>
            <rect x="734" y="600" width="78" height="40" rx="6" fill="none" stroke="#F2F3F5" stroke-width="6"/>
            <rect x="815" y="612" width="8"  height="16" rx="2" fill="#F2F3F5"/>
            <rect x="742" y="608" width="50" height="24" rx="2" fill="#28C840"/>
          </g>
        </g>
      </svg>
      <div class="nm">Quiet Notch</div>
      <div class="meta">music · cal · cam · battery</div>
    </div>

  </div>

  <script>
    // Generate the n=5 superellipse path and apply it to every .sq element.
    // Superellipse: |x/a|^n + |y/b|^n = 1, with n=5. Half-axes a=b=420 (= 840/2). Center (512,512).
    function squirclePath(cx, cy, halfW, halfH, n, samples) {
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = (i / samples) * Math.PI * 2;
        const ct = Math.cos(t), st = Math.sin(t);
        const x = cx + Math.sign(ct) * Math.pow(Math.abs(ct), 2/n) * halfW;
        const y = cy + Math.sign(st) * Math.pow(Math.abs(st), 2/n) * halfH;
        pts.push([x, y]);
      }
      return 'M ' + pts.map(p => p[0].toFixed(2) + ' ' + p[1].toFixed(2)).join(' L ') + ' Z';
    }
    const d = squirclePath(512, 512, 420, 420, 5, 240);
    document.querySelectorAll('path.sq').forEach(p => p.setAttribute('d', d));
  </script>
</body></html>
