name: QuietLens
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "5"
    INFOPLIST_KEY_CFBundleDisplayName: Quiet Lens
    INFOPLIST_KEY_CFBundleName: Quiet Lens
    PRODUCT_NAME: Quiet Lens
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    # Xcode 15+ recommended settings
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_NO_COMMON_BLOCKS: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    ALWAYS_SEARCH_USER_PATHS: NO
targets:
  QuietLens:
    type: application
    platform: macOS
    sources:
      - path: QuietLens
        excludes:
          - "Resources/Info.plist"
    resources:
      - QuietLens/Resources/Assets.xcassets
    info:
      path: QuietLens/Resources/Info.plist
      properties:
        LSUIElement: true
        LSBackgroundOnly: false
        NSHumanReadableCopyright: "Copyright © 2026 Quiet"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        NSAccessibilityUsageDescription: "Quiet Lens needs Accessibility access to detect which window is focused so it can dim other windows."
        CFBundleURLTypes:
          - CFBundleURLName: app.quiet.QuietLens.url
            CFBundleURLSchemes:
              - quietlens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietLens
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: QuietLens/Resources/QuietLens.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
