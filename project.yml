name: QuietLens
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "4"
    INFOPLIST_KEY_CFBundleDisplayName: Quiet Lens
    INFOPLIST_KEY_CFBundleName: Quiet Lens
    PRODUCT_NAME: Quiet Lens
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
targets:
  QuietLens:
    type: application
    platform: macOS
    sources:
      - path: QuietLens
        excludes:
          - "Resources/Info.plist"
    resources:
      - QuietLens/Resources/Assets.xcassets
    info:
      path: QuietLens/Resources/Info.plist
      properties:
        LSUIElement: true
        LSBackgroundOnly: false
        NSHumanReadableCopyright: "Copyright © 2026 Quiet"
        CFBundleShortVersionString: "1.0.3"
        CFBundleVersion: "4"
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        NSAccessibilityUsageDescription: "Quiet Lens needs Accessibility access to detect which window is focused so it can dim other windows."
        CFBundleURLTypes:
          - CFBundleURLName: app.quiet.QuietLens.url
            CFBundleURLSchemes:
              - quietlens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietLens
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: QuietLens/Resources/QuietLens.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
