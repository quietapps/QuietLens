name: FocusLens
options:
  bundleIdPrefix: com.parththummar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    INFOPLIST_KEY_CFBundleDisplayName: FocusLens
    INFOPLIST_KEY_CFBundleName: FocusLens
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
targets:
  FocusLens:
    type: application
    platform: macOS
    sources:
      - path: FocusLens
        excludes:
          - "Resources/Info.plist"
    resources:
      - FocusLens/Resources/Assets.xcassets
    info:
      path: FocusLens/Resources/Info.plist
      properties:
        LSUIElement: true
        LSBackgroundOnly: false
        NSHumanReadableCopyright: "Copyright © 2026"
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        NSAccessibilityUsageDescription: "FocusLens needs Accessibility access to detect which window is focused so it can dim other windows."
        CFBundleURLTypes:
          - CFBundleURLName: com.focuslens.url
            CFBundleURLSchemes:
              - focuslens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parththummar.FocusLens
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: FocusLens/Resources/FocusLens.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
